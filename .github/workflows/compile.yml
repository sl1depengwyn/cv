name: Compile CVs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ibm-plex

      - name: Compile
        run: |
          mkdir -p dist
          typst compile cv-en.typ dist/cv-eng.pdf
          typst compile cv-en.typ dist/cv-eng.png
          typst compile cv-ru.typ dist/cv-ru.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: compile
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
